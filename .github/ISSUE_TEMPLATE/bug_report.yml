name: Bug report
description: Report a reproducible problem
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Do not include passwords, tokens, private configuration, personal data, or production data.
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Explain the observed and expected behaviour.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Version, device/OS, runtime, and any relevant non-sensitive settings.
    validations:
      required: true
