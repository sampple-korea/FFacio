name: Build signed FFacio APK

on:
  workflow_dispatch:
  push:
    branches: [master]
    tags: ['v*']
    paths:
      - '.github/workflows/build-app-apk.yml'
      - 'android/**'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Restore signing key
        shell: bash
        env:
          KEYSTORE_BASE64: ${{ secrets.FFACIO_KEYSTORE_BASE64 }}
        run: |
          test -n "$KEYSTORE_BASE64"
          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/dev-siro.p12"
          chmod 600 "$RUNNER_TEMP/dev-siro.p12"

      - name: Run unit tests
        shell: bash
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew :app:testDebugUnitTest --stacktrace

      - name: Build signed release APK
        shell: bash
        working-directory: android
        env:
          FFACIO_KEYSTORE_PATH: ${{ runner.temp }}/dev-siro.p12
          FFACIO_KEYSTORE_PASSWORD: ${{ secrets.FFACIO_KEYSTORE_PASSWORD }}
          FFACIO_KEY_ALIAS: ${{ secrets.FFACIO_KEY_ALIAS }}
          FFACIO_KEY_PASSWORD: ${{ secrets.FFACIO_KEY_PASSWORD }}
        run: |
          ./gradlew :app:assembleRelease --stacktrace

      - name: Verify APK signature and package role
        shell: bash
        run: |
          BUILD_TOOLS_DIR="$(ls -d "$ANDROID_HOME"/build-tools/* | sort -V | tail -n 1)"
          APKSIGNER="$BUILD_TOOLS_DIR/apksigner"
          AAPT="$BUILD_TOOLS_DIR/aapt"
          test -x "$APKSIGNER"
          test -x "$AAPT"

          APK=android/app/build/outputs/apk/release/app-release.apk
          test -f "$APK"

          VERIFY_OUTPUT="$($APKSIGNER verify --verbose --print-certs "$APK")"
          printf '%s\n' "$VERIFY_OUTPUT"
          # Runtime APK와 같은 dev-siro 인증서여야 signature 권한으로 연결됩니다.
          printf '%s\n' "$VERIFY_OUTPUT" | grep -qi \
            'e1344975a288ec785ab12841ca8719b2115eadf41ae6f6e7ab8770979b7fa2b9'

          BADGING="$($AAPT dump badging "$APK")"
          printf '%s\n' "$BADGING"
          printf '%s\n' "$BADGING" | grep -q "package: name='com.ffacio.mobile'"
          printf '%s\n' "$BADGING" | grep -q "launchable-activity: name='com.ffacio.mobile.MainActivity'"

      - name: Collect APK
        shell: bash
        run: |
          mkdir -p artifacts
          cp android/app/build/outputs/apk/release/app-release.apk artifacts/FFacio-Android-release.apk
          cd artifacts
          sha256sum *.apk > SHA256SUMS.txt

      - name: Upload APK bundle
        uses: actions/upload-artifact@v4
        with:
          name: FFacio-Android-release
          path: artifacts/*
          if-no-files-found: error
          retention-days: 30

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" artifacts/* --clobber
          else
            gh release create "$GITHUB_REF_NAME" artifacts/* \
              --title "FFacio Android $GITHUB_REF_NAME" \
              --generate-notes
          fi
