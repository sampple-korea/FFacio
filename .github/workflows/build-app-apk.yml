name: Build signed FFacio + ITSOKEY Runtime

on:
  workflow_dispatch:
  push:
    branches: [master]
    tags: ['v*']
    paths:
      - '.github/workflows/build-app-apk.yml'
      - 'android/**'
      - 'itsokey-runtime/**'
      - 'scripts/**'
      - 'ITSOKEY_*.md'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Gradle 8.13
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.13'

      - name: Restore shared signing key
        shell: bash
        env:
          KEYSTORE_BASE64: ${{ secrets.FFACIO_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.FFACIO_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.FFACIO_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.FFACIO_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          test -n "$KEYSTORE_BASE64"
          test -n "$STORE_PASSWORD"
          test -n "$KEY_ALIAS"
          test -n "$KEY_PASSWORD"
          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/dev-siro.p12"
          chmod 600 "$RUNNER_TEMP/dev-siro.p12"
          keytool -list -v \
            -keystore "$RUNNER_TEMP/dev-siro.p12" \
            -storetype PKCS12 \
            -storepass "$STORE_PASSWORD" \
            -alias "$KEY_ALIAS" | tee signing-certificate.txt

      - name: Verify reconstructed ITSOKEY protocol source
        shell: bash
        run: python3 itsokey-runtime/tools/verify_source.py

      - name: Build and test ITSOKEY Runtime
        shell: bash
        working-directory: itsokey-runtime
        env:
          FFACIO_KEYSTORE_PATH: ${{ runner.temp }}/dev-siro.p12
          FFACIO_KEYSTORE_PASSWORD: ${{ secrets.FFACIO_KEYSTORE_PASSWORD }}
          FFACIO_KEY_ALIAS: ${{ secrets.FFACIO_KEY_ALIAS }}
          FFACIO_KEY_PASSWORD: ${{ secrets.FFACIO_KEY_PASSWORD }}
          FFACIO_KEYSTORE_TYPE: PKCS12
        run: |
          set -euo pipefail
          gradle --no-daemon clean \
            :app:testDebugUnitTest \
            :runtime-client:assembleRelease \
            :app:assembleRelease \
            --stacktrace
          test -f app/build/outputs/apk/release/app-release.apk

      - name: Verify FFacio source integration
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/verify_source_static.py
          python3 scripts/verify_itsokey_integration.py

      - name: Build and test FFacio
        shell: bash
        working-directory: android
        env:
          FFACIO_KEYSTORE_PATH: ${{ runner.temp }}/dev-siro.p12
          FFACIO_KEYSTORE_PASSWORD: ${{ secrets.FFACIO_KEYSTORE_PASSWORD }}
          FFACIO_KEY_ALIAS: ${{ secrets.FFACIO_KEY_ALIAS }}
          FFACIO_KEY_PASSWORD: ${{ secrets.FFACIO_KEY_PASSWORD }}
          FFACIO_KEYSTORE_TYPE: PKCS12
        run: |
          set -euo pipefail
          chmod +x ./gradlew
          ./gradlew --no-daemon clean \
            :app:testDebugUnitTest \
            :itsokey-runtime-client:assembleRelease \
            :app:assembleRelease \
            --stacktrace
          test -f app/build/outputs/apk/release/app-release.apk

      - name: Verify packages and identical signatures
        shell: bash
        run: |
          set -euo pipefail
          BUILD_TOOLS_DIR="$(find "$ANDROID_HOME/build-tools" -mindepth 1 -maxdepth 1 -type d | sort -V | tail -n 1)"
          APKSIGNER="$BUILD_TOOLS_DIR/apksigner"
          AAPT="$BUILD_TOOLS_DIR/aapt"
          FFACIO_APK=android/app/build/outputs/apk/release/app-release.apk
          ITSOKEY_APK=itsokey-runtime/app/build/outputs/apk/release/app-release.apk

          "$APKSIGNER" verify --verbose --print-certs "$FFACIO_APK" | tee ffacio-signature.txt
          "$APKSIGNER" verify --verbose --print-certs "$ITSOKEY_APK" | tee itsokey-signature.txt
          "$AAPT" dump badging "$FFACIO_APK" | tee ffacio-badging.txt
          "$AAPT" dump badging "$ITSOKEY_APK" | tee itsokey-badging.txt

          grep -q "package: name='com.ffacio.mobile'" ffacio-badging.txt
          grep -q "launchable-activity: name='com.ffacio.mobile.MainActivity'" ffacio-badging.txt
          grep -q "package: name='io.ffacio.itsokeyruntime'" itsokey-badging.txt
          grep -q "launchable-activity: name='io.ffacio.itsokeyruntime.MainActivity'" itsokey-badging.txt

          FFACIO_SHA="$(sed -n 's/^.*certificate SHA-256 digest: //p' ffacio-signature.txt | head -n 1 | tr -d '[:space:]')"
          ITSOKEY_SHA="$(sed -n 's/^.*certificate SHA-256 digest: //p' itsokey-signature.txt | head -n 1 | tr -d '[:space:]')"
          test -n "$FFACIO_SHA"
          test "$FFACIO_SHA" = "$ITSOKEY_SHA"
          test "$FFACIO_SHA" = "e1344975a288ec785ab12841ca8719b2115eadf41ae6f6e7ab8770979b7fa2b9"
          printf 'Shared signer SHA-256: %s\n' "$FFACIO_SHA" | tee shared-signature.txt

      - name: Package APKs and separate source ZIPs
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          cp android/app/build/outputs/apk/release/app-release.apk artifacts/FFacio-ITSOKEY-release.apk
          cp itsokey-runtime/app/build/outputs/apk/release/app-release.apk artifacts/ITSOKEY-Runtime-release.apk
          find itsokey-runtime/runtime-client/build/outputs/aar -name '*-release.aar' -print -quit | \
            xargs -I{} cp '{}' artifacts/ITSOKEY-Runtime-client-release.aar

          zip -qr artifacts/ITSOKEY-Runtime-source.zip itsokey-runtime \
            -x '*/build/*' '*/.gradle/*' '*/.idea/*' '*/local.properties'
          zip -qr artifacts/FFacio-ITSOKEY-source.zip . \
            -x '.git/*' 'itsokey-runtime/*' 'artifacts/*' '*/build/*' '*/.gradle/*' '*/.idea/*' '*/local.properties'

          cp ffacio-signature.txt itsokey-signature.txt shared-signature.txt \
             ffacio-badging.txt itsokey-badging.txt signing-certificate.txt artifacts/
          (cd artifacts && sha256sum * > SHA256SUMS.txt)
          ls -lh artifacts

      - name: Upload build bundle
        uses: actions/upload-artifact@v4
        with:
          name: FFacio-ITSOKEY-signed-build
          path: artifacts/*
          if-no-files-found: error
          retention-days: 30

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" artifacts/* --clobber
          else
            gh release create "$GITHUB_REF_NAME" artifacts/* \
              --title "FFacio + ITSOKEY Runtime $GITHUB_REF_NAME" \
              --generate-notes
          fi
